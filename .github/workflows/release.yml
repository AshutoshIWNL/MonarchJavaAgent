name: Release

on:
  push:
    tags:
      - "*.RELEASE"
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate Tag Matches pom.xml Version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          POM_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1 | tr -d '\r')"

          if [[ "${TAG}" =~ ^v(.+)$ ]]; then
            TAG_VERSION="${BASH_REMATCH[1]}"
          elif [[ "${TAG}" =~ ^(.+)\.RELEASE$ ]]; then
            TAG_VERSION="${BASH_REMATCH[1]}"
          else
            echo "Unsupported release tag format: ${TAG}"
            echo "Supported formats: v<version>, <version>.RELEASE"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${POM_VERSION}" ]]; then
            echo "Tag/version mismatch:"
            echo "  tag => ${TAG} (parsed: ${TAG_VERSION})"
            echo "  pom => ${POM_VERSION}"
            exit 1
          fi

          echo "Tag/version match confirmed: ${TAG_VERSION}"

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B -q clean verify

      - name: Prepare Release Artifacts
        shell: bash
        run: |
          set -euo pipefail
          JAR="$(ls target/*-all.jar | head -n 1)"
          if [ -z "${JAR}" ]; then
            echo "No shaded (-all) jar found under target/"
            exit 1
          fi
          SHA_FILE="$(basename "${JAR}").sha256"
          sha256sum "${JAR}" > "target/${SHA_FILE}"
          echo "RELEASE_JAR=${JAR}" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=target/${SHA_FILE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ env.RELEASE_JAR }}" \
            "${{ env.RELEASE_SHA }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
