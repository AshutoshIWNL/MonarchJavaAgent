name: Build

on:
  push:
    paths-ignore:
      - "docs/**"
      - "jekyll/**"
      - "**/*.md"
      - "**/*.MD"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - ".m2/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "jekyll/**"
      - "**/*.md"
      - "**/*.MD"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - ".m2/**"

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B -q -DskipTests clean package
