name: Build

on:
  push:
    paths-ignore:
      - "docs/**"
      - "jekyll/**"
      - "**/*.md"
      - "**/*.MD"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - ".m2/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "jekyll/**"
      - "**/*.md"
      - "**/*.MD"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - ".m2/**"

jobs:
  build:
    name: Maven Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["8", "17", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and Test
        run: mvn -B -q clean verify
